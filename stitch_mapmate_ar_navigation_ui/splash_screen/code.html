<!DOCTYPE html>

<html class="dark" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .synthetic-grid {
            background-image: 
                linear-gradient(to right, #494847 1px, transparent 1px),
                linear-gradient(to bottom, #494847 1px, transparent 1px);
            background-size: 80px 80px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            opacity: 0.15;
        }
        .glow-overlay {
            background: radial-gradient(circle at 50% 50%, rgba(143, 245, 255, 0.05) 0%, transparent 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body text-on-surface antialiased overflow-hidden">
<!-- Suppression Logic: Splash screen is transactional/onboarding focus, so TopAppBar and BottomNavBar are excluded. -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-center p-6 overflow-hidden">
<!-- Background Layering -->
<div class="absolute inset-0 synthetic-grid pointer-events-none"></div>
<div class="absolute inset-0 glow-overlay pointer-events-none"></div>
<!-- Background Ambient Image - Abstract Map Data Flow -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] opacity-20 blur-3xl pointer-events-none">
<img class="w-full h-full object-cover" data-alt="abstract digital visualization of glowing circuit pathways and data streams in cyan and dark charcoal grey" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBmEMXepjHizzLNwiSDZ-4CuuAyPyk7u9Ejgkgf4BvhusTilXSvLUh4DfxSCpHXZBdkJpEhwWJ26fE76qr_DLcgzF6q7JyvFVJKmQg0iRg4bDofhanOpIWDPitNTgmCkug4DpYZZc0rLL2fl9fCEXJfL066EPsDxdj7JuCxu0vlw3thLsvebajVJK5J8OBSiVsuVZfYMlNbQZznUMiGCXLcfNg11ufwOky1g_sjSc2xUyZLkl_VcGKEVkHozHv6YqFwCztJslKL9cc"/>
</div>
<!-- Central Identity Container -->
<div class="relative z-10 flex flex-col items-center">
<!-- App Logo / Icon -->
<div class="relative mb-10">
<!-- Outer Glow -->
<div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full scale-150"></div>
<!-- Logo Frame -->
<div class="relative bg-surface-container-highest p-8 rounded-[2rem] shadow-[0_0_40px_rgba(143,245,255,0.1)] border border-outline-variant/10">
<span class="material-symbols-outlined text-7xl text-primary" data-icon="explore" style="font-variation-settings: 'FILL' 1;">explore</span>
</div>
<!-- Floating Technical Accents -->
<div class="absolute -top-4 -right-4 w-12 h-12 flex items-center justify-center bg-secondary/10 rounded-xl border border-secondary/20 backdrop-blur-md">
<span class="material-symbols-outlined text-secondary text-xl" data-icon="near_me" style="font-variation-settings: 'FILL' 1;">near_me</span>
</div>
</div>
<!-- Brand Typography -->
<div class="text-center space-y-4">
<h1 class="font-headline text-6xl md:text-8xl font-black tracking-tighter text-on-surface">
                    MapMate
                </h1>
<!-- Divider/Tagline Strategy -->
<div class="flex items-center justify-center gap-4">
<div class="h-[1px] w-8 bg-outline-variant/30"></div>
<p class="font-label text-sm md:text-base uppercase tracking-[0.4em] text-primary-dim font-medium">
                        Offline Indoor Navigation
                    </p>
<div class="h-[1px] w-8 bg-outline-variant/30"></div>
</div>
</div>
</div>
<!-- Asymmetric Loading / Detail Elements -->
<div class="absolute bottom-20 left-10 hidden md:block">
<div class="space-y-1">
<p class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant/40">Signal Strength</p>
<div class="flex gap-1">
<div class="h-1 w-6 bg-secondary rounded-full"></div>
<div class="h-1 w-6 bg-secondary rounded-full"></div>
<div class="h-1 w-6 bg-secondary rounded-full"></div>
<div class="h-1 w-6 bg-outline-variant/20 rounded-full"></div>
</div>
</div>
</div>
<div class="absolute top-20 right-10 hidden md:block text-right">
<div class="space-y-1">
<p class="text-[10px] font-label uppercase tracking-widest text-on-surface-variant/40">Core Status</p>
<p class="text-xs font-headline font-bold text-primary">ENCRYPTION ACTIVE</p>
</div>
</div>
<!-- Bottom Loading State / Status -->
<div class="absolute bottom-16 w-full max-w-xs px-6">
<div class="flex flex-col items-center gap-6">
<!-- Progress Indicator -->
<div class="w-full h-1 bg-surface-container-highest rounded-full overflow-hidden relative">
<div class="absolute top-0 left-0 h-full w-1/3 bg-primary shadow-[0_0_10px_rgba(143,245,255,0.8)] rounded-full"></div>
</div>
<!-- Status Pill -->
<div class="px-4 py-2 bg-surface-bright/50 backdrop-blur-xl rounded-full border border-outline-variant/10 flex items-center gap-3">
<div class="w-1.5 h-1.5 rounded-full bg-secondary animate-pulse shadow-[0_0_8px_rgba(47,248,1,0.6)]"></div>
<span class="text-[10px] font-label font-bold text-on-surface-variant uppercase tracking-widest">Calibrating synthetic sensors...</span>
</div>
</div>
</div>
<!-- Subtle Footer Signature -->
<div class="absolute bottom-6 left-1/2 -translate-x-1/2">
<p class="text-[8px] font-label text-outline-variant/30 uppercase tracking-[0.5em]">v4.0.2 // Project Synthetic Compass</p>
</div>
</main>
