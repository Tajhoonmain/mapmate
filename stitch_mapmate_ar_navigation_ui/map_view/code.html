<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MapMate - Interior Navigation</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=Inter:wght@300..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#00213e",
                    "surface-container-high": "#201f1f",
                    "tertiary-fixed-dim": "#51a7fe",
                    "primary": "#8ff5ff",
                    "background": "#0e0e0e",
                    "primary-dim": "#00deec",
                    "secondary": "#2ff801",
                    "on-primary-fixed-variant": "#005e64",
                    "tertiary-dim": "#4aa2f9",
                    "on-secondary-fixed-variant": "#0d6200",
                    "secondary-dim": "#2be800",
                    "surface-tint": "#8ff5ff",
                    "surface": "#0e0e0e",
                    "on-error-container": "#ffa8a3",
                    "error": "#ff716c",
                    "surface-container-lowest": "#000000",
                    "inverse-primary": "#006a71",
                    "secondary-fixed-dim": "#2be800",
                    "primary-fixed": "#00eefc",
                    "on-background": "#ffffff",
                    "surface-container-highest": "#262626",
                    "surface-dim": "#0e0e0e",
                    "secondary-fixed": "#2ff801",
                    "primary-container": "#00eefc",
                    "tertiary-container": "#4aa2f9",
                    "on-surface": "#ffffff",
                    "outline-variant": "#494847",
                    "on-secondary-container": "#e7ffd9",
                    "secondary-container": "#106e00",
                    "on-surface-variant": "#adaaaa",
                    "surface-container-low": "#131313",
                    "surface-variant": "#262626",
                    "on-primary-fixed": "#003f43",
                    "on-tertiary-fixed-variant": "#003b68",
                    "surface-bright": "#2c2c2c",
                    "outline": "#777575",
                    "surface-container": "#1a1919",
                    "primary-fixed-dim": "#00deec",
                    "error-container": "#9f0519",
                    "inverse-on-surface": "#565554",
                    "on-tertiary-fixed": "#001930",
                    "tertiary-fixed": "#72b5ff",
                    "error-dim": "#d7383b",
                    "on-secondary-fixed": "#064200",
                    "inverse-surface": "#fcf8f8",
                    "on-error": "#490006",
                    "on-secondary": "#0b5800",
                    "on-tertiary": "#002e52",
                    "on-primary-container": "#005359",
                    "tertiary": "#65afff",
                    "on-primary": "#005d63"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Space Grotesk"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body { font-family: 'Inter', sans-serif; background-color: #0e0e0e; color: #ffffff; }
        .font-space-grotesk { font-family: 'Space Grotesk', sans-serif; }
        .map-grid {
            background-image: radial-gradient(rgba(143, 245, 255, 0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface overflow-hidden">
<!-- TopAppBar from JSON -->
<header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl flex justify-between items-center px-6 h-16 shadow-[0_0_20px_rgba(143,245,255,0.06)]">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-cyan-400" data-icon="explore">explore</span>
<h1 class="text-2xl font-black text-cyan-400 tracking-tighter font-space-grotesk">MapMate</h1>
</div>
<div class="flex items-center gap-4">
<button class="hover:bg-zinc-800/50 transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-zinc-500" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<!-- Map Canvas Area -->
<main class="relative w-full h-screen map-grid flex items-center justify-center pt-16 pb-24 overflow-hidden">
<!-- Floor Level Asymmetric Indicator -->
<div class="absolute top-24 left-8 pointer-events-none">
<p class="font-headline text-on-surface-variant text-sm font-medium tracking-widest uppercase">Location</p>
<h2 class="font-headline text-8xl font-bold text-on-surface/10 leading-none -ml-1">L04</h2>
<div class="mt-2 flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
<p class="font-body text-xs font-semibold text-secondary-dim tracking-wide">SYSTEMS ACTIVE</p>
</div>
</div>
<!-- 2D Minimalist Floor Plan Mockup -->
<div class="relative w-full max-w-4xl aspect-[4/3] px-12">
<!-- Walls (Tonal Layering) -->
<div class="absolute inset-0 bg-surface-container-low opacity-40 rounded-[2rem] -rotate-1 border border-outline-variant/10"></div>
<svg class="w-full h-full drop-shadow-[0_0_15px_rgba(143,245,255,0.1)]" fill="none" viewbox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
<!-- Structural Geometry -->
<rect height="500" opacity="0.3" rx="12" stroke="#494847" stroke-dasharray="8 8" stroke-width="1" width="700" x="50" y="50"></rect>
<!-- Rooms/Zones -->
<path d="M100 100 H300 V250 H100 V100Z" fill="#1a1919" fill-opacity="0.6"></path>
<path d="M350 100 H700 V300 H350 V100Z" fill="#1a1919" fill-opacity="0.6"></path>
<path d="M100 350 H450 V500 H100 V350Z" fill="#1a1919" fill-opacity="0.6"></path>
<path d="M500 350 H700 V500 H500 V350Z" fill="#1a1919" fill-opacity="0.6"></path>
<!-- Active Path (Neon Glow) -->
<path class="drop-shadow-[0_0_8px_#8ff5ff]" d="M150 425 H550 V200 H650" id="active-path" stroke="#8ff5ff" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
<!-- Destination Point -->
<circle class="drop-shadow-[0_0_12px_#2ff801]" cx="650" cy="200" fill="#2ff801" r="10"></circle>
<circle cx="650" cy="200" opacity="0.4" r="18" stroke="#2ff801" stroke-width="2">
<!-- Simulation of pulse -->
</circle>
<!-- Current Position (Heads-up Style) -->
<g transform="translate(150, 425)">
<circle fill="#8ff5ff" r="6"></circle>
<circle r="14" stroke="#8ff5ff" stroke-dasharray="2 4" stroke-width="1"></circle>
<path d="M0 -25 L5 -18 H-5 Z" fill="#8ff5ff"></path>
</g>
<!-- POI Labels -->
<text fill="#adaaaa" font-family="Inter" font-size="10" font-weight="500" tracking="1" x="120" y="130">RESEARCH LAB A</text>
<text fill="#adaaaa" font-family="Inter" font-size="10" font-weight="500" tracking="1" x="500" y="130">AUDITORIUM IV</text>
<text fill="#ffffff" font-family="Space Grotesk" font-size="12" font-weight="700" x="550" y="425">NORTH WING CORRIDOR</text>
</svg>
</div>
<!-- Floating Search Field (Synthetic Compass Style) -->
<div class="absolute top-24 right-8 w-64">
<div class="bg-surface-container-lowest/80 backdrop-blur-md rounded-xl p-3 border border-outline-variant/15 flex items-center gap-3">
<span class="material-symbols-outlined text-primary-dim text-sm" data-icon="search">search</span>
<input class="bg-transparent border-none focus:ring-0 text-sm font-medium placeholder:text-zinc-600 w-full" placeholder="Search destination..." type="text"/>
</div>
</div>
<!-- Hero Navigation Card -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-surface-container-highest rounded-xl p-6 shadow-[0_8px_32px_rgba(0,0,0,0.6)] overflow-hidden">
<!-- Glow Strip -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-secondary shadow-[0_0_10px_rgba(47,248,1,0.5)]"></div>
<div class="flex justify-between items-start">
<div class="space-y-1">
<p class="font-label text-[10px] text-primary tracking-widest uppercase font-bold">Next Instruction</p>
<h3 class="font-headline text-xl font-bold text-on-surface">Turn Right at Corridor 4B</h3>
<p class="font-body text-sm text-on-surface-variant">Proceed 45 meters towards North Wing</p>
</div>
<div class="text-right">
<p class="font-headline text-3xl font-bold text-primary">45<span class="text-sm ml-1 font-medium">m</span></p>
<p class="text-[10px] text-zinc-500 font-bold uppercase tracking-tighter">Remaining</p>
</div>
</div>
<div class="mt-6 flex items-center justify-between border-t border-outline-variant/20 pt-4">
<div class="flex gap-4">
<div class="flex flex-col">
<span class="text-[9px] uppercase font-bold text-zinc-500">Time</span>
<span class="text-sm font-bold text-on-surface font-headline">2 min</span>
</div>
<div class="flex flex-col">
<span class="text-[9px] uppercase font-bold text-zinc-500">ETA</span>
<span class="text-sm font-bold text-on-surface font-headline">14:02</span>
</div>
</div>
<button class="bg-primary/10 text-primary px-4 py-2 rounded-lg text-xs font-bold font-headline uppercase tracking-widest hover:bg-primary/20 transition-all">
                    Finish
                </button>
</div>
</div>
</main>
<!-- BottomNavBar from JSON -->
<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-3xl bg-zinc-900/70 backdrop-blur-2xl flex justify-around items-center h-20 px-4 shadow-[0_8px_32px_rgba(0,0,0,0.8)] z-50">
<!-- Home (Inactive) -->
<a class="text-zinc-500 p-3 hover:text-cyan-200 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="home_max">home_max</span>
</a>
<!-- Navigation (Active) -->
<a class="bg-cyan-500/20 text-cyan-400 rounded-2xl p-3 shadow-[0_0_15px_rgba(143,245,255,0.3)] active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="near_me">near_me</span>
</a>
<!-- Layers (Inactive) -->
<a class="text-zinc-500 p-3 hover:text-cyan-200 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</a>
<!-- Settings (Inactive) -->
<a class="text-zinc-500 p-3 hover:text-cyan-200 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</a>
</nav>
<!-- Dynamic Overlay for Contextual Map Data -->
<div class="fixed top-20 left-1/2 -translate-x-1/2 z-40">
<div class="bg-surface-bright/90 backdrop-blur-md px-4 py-1.5 rounded-full flex items-center gap-3 border border-outline-variant/10">
<span class="w-2 h-2 rounded-full bg-secondary"></span>
<span class="text-[10px] font-bold text-on-surface/70 uppercase tracking-[0.2em] font-headline">GPS Signal Locked • L04 Mesh Net</span>
</div>
</div>
</body></html>
